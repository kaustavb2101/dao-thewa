<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2732 2732" width="2732" height="2732">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#0D1A40"/>
      <stop offset="60%" stop-color="#06101E"/>
      <stop offset="100%" stop-color="#030610"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F5C842" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#F5C842" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="2732" height="2732" fill="url(#bg)"/>

  <!-- Stars -->
  <circle cx="400"  cy="300"  r="3"   fill="#fff" opacity="0.35"/>
  <circle cx="2300" cy="400"  r="4"   fill="#fff" opacity="0.3"/>
  <circle cx="200"  cy="1400" r="3"   fill="#fff" opacity="0.25"/>
  <circle cx="2500" cy="1600" r="3.5" fill="#fff" opacity="0.3"/>
  <circle cx="600"  cy="2400" r="3"   fill="#fff" opacity="0.2"/>
  <circle cx="2100" cy="2500" r="4"   fill="#fff" opacity="0.28"/>
  <circle cx="1100" cy="200"  r="2.5" fill="#fff" opacity="0.35"/>
  <circle cx="1600" cy="180"  r="2"   fill="#fff" opacity="0.3"/>
  <circle cx="100"  cy="900"  r="2.5" fill="#fff" opacity="0.25"/>
  <circle cx="2600" cy="900"  r="3"   fill="#fff" opacity="0.3"/>

  <!-- Central glow -->
  <circle cx="1366" cy="1260" r="700" fill="url(#glow)"/>

  <!-- Orbit rings -->
  <circle cx="1366" cy="1260" r="420" fill="none" stroke="#F5C842" stroke-width="2"   stroke-opacity="0.1"/>
  <circle cx="1366" cy="1260" r="560" fill="none" stroke="#F5C842" stroke-width="1.5" stroke-opacity="0.06"/>
  <circle cx="1366" cy="1260" r="680" fill="none" stroke="#F5C842" stroke-width="1"   stroke-opacity="0.04"/>

  <!-- Planet dots -->
  <circle cx="1786" cy="1260" r="14" fill="#E8880A" opacity="0.75"/>
  <circle cx="938"  cy="1080" r="11" fill="#C8C8E0" opacity="0.6"/>
  <circle cx="1560" cy="870"  r="13" fill="#F5C842" opacity="0.7"/>
  <circle cx="916"  cy="1620" r="10" fill="#80CBC4" opacity="0.6"/>
  <circle cx="1820" cy="980"  r="10" fill="#EF5350" opacity="0.65"/>

  <!-- Lotus / star motif -->
  <g transform="translate(1366,1260)">
    <ellipse rx="46" ry="150" fill="#F5C842" opacity="0.14" transform="rotate(0)"/>
    <ellipse rx="46" ry="150" fill="#F5C842" opacity="0.14" transform="rotate(45)"/>
    <ellipse rx="46" ry="150" fill="#F5C842" opacity="0.14" transform="rotate(90)"/>
    <ellipse rx="46" ry="150" fill="#F5C842" opacity="0.14" transform="rotate(135)"/>
    <ellipse rx="46" ry="150" fill="#F5C842" opacity="0.14" transform="rotate(180)"/>
    <ellipse rx="46" ry="150" fill="#F5C842" opacity="0.14" transform="rotate(225)"/>
    <ellipse rx="46" ry="150" fill="#F5C842" opacity="0.14" transform="rotate(270)"/>
    <ellipse rx="46" ry="150" fill="#F5C842" opacity="0.14" transform="rotate(315)"/>
    <ellipse rx="30" ry="110" fill="#F5C842" opacity="0.4" transform="rotate(22.5)"/>
    <ellipse rx="30" ry="110" fill="#F5C842" opacity="0.4" transform="rotate(67.5)"/>
    <ellipse rx="30" ry="110" fill="#F5C842" opacity="0.4" transform="rotate(112.5)"/>
    <ellipse rx="30" ry="110" fill="#F5C842" opacity="0.4" transform="rotate(157.5)"/>
    <ellipse rx="30" ry="110" fill="#F5C842" opacity="0.4" transform="rotate(202.5)"/>
    <ellipse rx="30" ry="110" fill="#F5C842" opacity="0.4" transform="rotate(247.5)"/>
    <ellipse rx="30" ry="110" fill="#F5C842" opacity="0.4" transform="rotate(292.5)"/>
    <ellipse rx="30" ry="110" fill="#F5C842" opacity="0.4" transform="rotate(337.5)"/>
    <circle r="90"  fill="#060C1E"/>
    <circle r="82"  fill="none" stroke="#F5C842" stroke-width="2.5" stroke-opacity="0.55"/>
    <text text-anchor="middle" dominant-baseline="central" font-size="82" fill="#F5C842" font-family="serif">✦</text>
  </g>

  <!-- Title -->
  <text x="1366" y="1640" text-anchor="middle"
        font-family="'Sarabun','Noto Sans Thai',sans-serif"
        font-size="160" font-weight="300" fill="#F5C842" letter-spacing="20" opacity="0.95">ดาวเทวา</text>

  <!-- Subtitle -->
  <text x="1366" y="1760" text-anchor="middle"
        font-family="'Sarabun','Noto Sans Thai',sans-serif"
        font-size="52" font-weight="300" fill="#F5C842" letter-spacing="14" opacity="0.4">DAO THEWA</text>
</svg>
