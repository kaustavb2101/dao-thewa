name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: DaoThewa/package-lock.json

      - name: Install Dependencies
        run: |
          cd DaoThewa
          npm install --legacy-peer-deps

      - name: Run Lint
        run: |
          cd DaoThewa
          npm run lint

      - name: Run Type Check
        run: |
          cd DaoThewa
          npm run type-check

      - name: Run Tests
        run: |
          cd DaoThewa
          npm test
